<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Math</h1>
<form action="/math" method="post">
  <input type="text" name="input" id="input" placeholder="Input N" th:value="${input}">
  <button type="submit">Submit</button>
</form>
  <div th:if="${input  != null}">
    <div th:if="${errorMsg}" th:text="${errorMsg}" style="color:red;"></div>
    <div th:unless="${errorMsg}">
      <ul>
        <li th:each="number : ${primes}" th:text="${number}"></li>
      </ul>

    </div>
    <a th:href="@{/}">Back to home </a>
  </div>

<div th:replace="~{footer :: copy}"></div>
</body>
</html>
